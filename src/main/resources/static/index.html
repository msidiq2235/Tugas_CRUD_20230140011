<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f4f7f6; padding-top: 30px; padding-bottom: 50px; }
        .card { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; }
        .card-header { background-color: #0d6efd; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold;}
        .table-responsive { border-radius: 8px; overflow: hidden; }
        .table th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 mb-4">
            <div class="card">
                <div class="card-header text-center py-3">
                    <i class="fas fa-id-card me-2"></i> Form Data KTP
                </div>
                <div class="card-body p-4">
                    <form id="ktpForm">
                        <input type="hidden" id="ktpId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nomor KTP (NIK)</label>
                                <input type="text" class="form-control" id="nomorKtp" required maxlength="16" placeholder="Masukkan 16 digit NIK">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nama Lengkap</label>
                                <input type="text" class="form-control" id="namaLengkap" required placeholder="Sesuai KTP">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Alamat Lengkap</label>
                            <textarea class="form-control" id="alamat" rows="2" required placeholder="Jl. Contoh No. 123..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tanggal Lahir</label>
                                <input type="date" class="form-control" id="tanggalLahir" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Jenis Kelamin</label>
                                <select class="form-select" id="jenisKelamin" required>
                                    <option value="" selected disabled>-- Pilih Jenis Kelamin --</option>
                                    <option value="Laki-laki">Laki-laki</option>
                                    <option value="Perempuan">Perempuan</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
                            <button type="button" class="btn btn-secondary px-4" onclick="resetForm()">
                                <i class="fas fa-times me-1"></i> Batal
                            </button>
                            <button type="submit" class="btn btn-primary px-4" id="btnSave">
                                <i class="fas fa-save me-1"></i> Simpan Data
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-12">
            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3"><i class="fas fa-list me-2"></i> Daftar KTP Terdaftar</h5>
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="text-center">
                            <tr>
                                <th>No KTP</th>
                                <th>Nama Lengkap</th>
                                <th>Alamat</th>
                                <th>Tanggal Lahir</th>
                                <th>Jenis Kelamin</th>
                                <th width="150px">Aksi</th>
                            </tr>
                            </thead>
                            <tbody id="ktpTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        // Submit Form
        $('#ktpForm').submit(function(e) {
            e.preventDefault();

            let id = $('#ktpId').val();
            let ktpData = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            let type = id ? 'PUT' : 'POST';
            let url = id ? `${API_URL}/${id}` : API_URL;

            // Tampilkan loading spinner bawaan SweetAlert
            Swal.showLoading();

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(ktpData),
                success: function(response) {
                    // Notifikasi Sukses yang Cantik
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil!',
                        text: response.message,
                        timer: 2000,
                        showConfirmButton: false
                    });
                    resetForm();
                    loadData();
                },
                error: function(err) {
                    let errMsg = err.responseJSON ? err.responseJSON.message : "Terjadi kesalahan server";
                    // Notifikasi Error
                    Swal.fire({
                        icon: 'error',
                        title: 'Gagal Menyimpan!',
                        text: errMsg
                    });
                }
            });
        });
    });

    // Load Data ke Tabel
    function loadData() {
        $.ajax({
            url: API_URL,
            type: 'GET',
            success: function(data) {
                let rows = '';
                if(data.length === 0) {
                    rows = '<tr><td colspan="6" class="text-center text-muted py-4">Belum ada data KTP terdaftar.</td></tr>';
                } else {
                    $.each(data, function(index, ktp) {
                        rows += `<tr>
                            <td class="text-center fw-bold">${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td class="text-center">${ktp.tanggalLahir}</td>
                            <td class="text-center">${ktp.jenisKelamin}</td>
                            <td class="text-center">
                                <button class="btn btn-warning btn-sm text-white" onclick="editData(${ktp.id})" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteData(${ktp.id})" title="Hapus">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                    });
                }
                $('#ktpTableBody').html(rows);
            }
        });
    }

    // Tarik Data untuk Edit
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: 'GET',
            success: function(response) {
                let ktp = response.data;
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp).prop('readonly', true).addClass('bg-light');
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                $('#btnSave').html('<i class="fas fa-sync-alt me-1"></i> Update Data').removeClass('btn-primary').addClass('btn-success');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    // Hapus Data dengan Konfirmasi SweetAlert
    function deleteData(id) {
        Swal.fire({
            title: 'Apakah Anda Yakin?',
            text: "Data KTP ini akan dihapus secara permanen!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Ya, Hapus!',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `${API_URL}/${id}`,
                    type: 'DELETE',
                    success: function(response) {
                        Swal.fire('Terhapus!', response.message, 'success');
                        loadData();
                    },
                    error: function() {
                        Swal.fire('Gagal!', 'Data tidak dapat dihapus.', 'error');
                    }
                });
            }
        });
    }

    // Reset Form
    function resetForm() {
        $('#ktpId').val('');
        $('#nomorKtp').val('').prop('readonly', false).removeClass('bg-light');
        $('#namaLengkap').val('');
        $('#alamat').val('');
        $('#tanggalLahir').val('');
        $('#jenisKelamin').val('');
        $('#btnSave').html('<i class="fas fa-save me-1"></i> Simpan Data').removeClass('btn-success').addClass('btn-primary');
    }
</script>

</body>
</html>
