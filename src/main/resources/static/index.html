<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9;}
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        button.btn-danger { background-color: #dc3545; }
        button.btn-danger:hover { background-color: #c82333; }
        button.btn-warning { background-color: #ffc107; color: black; }
        button.btn-warning:hover { background-color: #e0a800; }
        button[type="button"] { background-color: #6c757d; }
        button[type="button"]:hover { background-color: #5a6268; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        #message { margin-bottom: 15px; font-weight: bold; text-align: center; }
        .action-btns { display: flex; gap: 5px; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Form Data KTP</h2>
    <div id="message"></div>

    <form id="ktpForm">
        <input type="hidden" id="ktpId">
        <div class="form-group">
            <label>Nomor KTP:</label>
            <input type="text" id="nomorKtp" required maxlength="16" placeholder="Masukkan 16 digit NIK">
        </div>
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" id="namaLengkap" required placeholder="Nama sesuai KTP">
        </div>
        <div class="form-group">
            <label>Alamat:</label>
            <input type="text" id="alamat" required placeholder="Alamat lengkap">
        </div>
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" id="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <select id="jenisKelamin" required>
                <option value="">-- Pilih Jenis Kelamin --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>
        <button type="submit" id="btnSave">Simpan Data</button>
        <button type="button" id="btnReset" onclick="resetForm()">Batal</button>
    </form>

    <h2 style="text-align: center; margin-top: 40px;">Daftar KTP</h2>
    <table>
        <thead>
        <tr>
            <th>No KTP</th>
            <th>Nama Lengkap</th>
            <th>Alamat</th>
            <th>Tanggal Lahir</th>
            <th>Jenis Kelamin</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody id="ktpTableBody">
        </tbody>
    </table>
</div>

<script>
    // URL API Backend Spring Boot
    const API_URL = "http://localhost:8080/ktp";

    // Dijalankan pertama kali saat halaman dibuka
    $(document).ready(function() {
        loadData();

        // Event saat form disubmit (POST untuk tambah, PUT untuk update)
        $('#ktpForm').submit(function(e) {
            e.preventDefault(); // Mencegah halaman refresh

            let id = $('#ktpId').val();
            let ktpData = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            let type = id ? 'PUT' : 'POST';
            let url = id ? `${API_URL}/${id}` : API_URL;

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(ktpData),
                success: function(response) {
                    $('#message').text(response.message).css("color", "green");
                    resetForm();
                    loadData(); // Refresh tabel setelah tambah/edit
                },
                error: function(err) {
                    let errMsg = err.responseJSON ? err.responseJSON.message : "Terjadi kesalahan";
                    $('#message').text("Gagal: " + errMsg).css("color", "red");
                }
            });
        });
    });

    // Fungsi GET - Mengambil data dan menampilkan di tabel
    function loadData() {
        $.ajax({
            url: API_URL,
            type: 'GET',
            success: function(data) {
                let rows = '';
                if(data.length === 0) {
                    rows = '<tr><td colspan="6" style="text-align:center;">Belum ada data KTP</td></tr>';
                } else {
                    $.each(data, function(index, ktp) {
                        rows += `<tr>
                            <td>${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td class="action-btns">
                                <button class="btn-warning" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn-danger" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>`;
                    });
                }
                $('#ktpTableBody').html(rows);
            },
            error: function() {
                $('#message').text("Gagal memuat data dari server.").css("color", "red");
            }
        });
    }

    // Fungsi GET by ID - Menarik data ke form untuk di-edit
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: 'GET',
            success: function(response) {
                let ktp = response.data; // Mengambil object data dari ApiResponse
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp).prop('disabled', true); // NIK dikunci saat edit
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                $('#btnSave').text('Update Data');
                window.scrollTo(0, 0); // Scroll ke atas (ke form)
            }
        });
    }

    // Fungsi DELETE - Menghapus data
    function deleteData(id) {
        if(confirm("Apakah Anda yakin ingin menghapus data KTP ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: 'DELETE',
                success: function(response) {
                    $('#message').text(response.message).css("color", "green");
                    loadData(); // Refresh tabel
                },
                error: function(err) {
                    $('#message').text("Gagal menghapus data.").css("color", "red");
                }
            });
        }
    }

    // Fungsi untuk mengosongkan form
    function resetForm() {
        $('#ktpId').val('');
        $('#nomorKtp').val('').prop('disabled', false);
        $('#namaLengkap').val('');
        $('#alamat').val('');
        $('#tanggalLahir').val('');
        $('#jenisKelamin').val('');
        $('#btnSave').text('Simpan Data');
    }
</script>

</body>
</html>
